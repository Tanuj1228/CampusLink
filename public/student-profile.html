<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | CampusLink</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">
    <nav class="navbar">
        <a href="index.html" class="logo">CampusLink</a>
        <div class="nav-links">
            <button class="btn-outline" onclick="window.location.href='/student-dashboard.html'">Back to Dashboard</button>
            <button class="btn-primary" onclick="logout()" style="background: #dc3545;">Logout</button>
        </div>
    </nav>
    
    <div class="container" style="flex-grow: 1; max-width: 800px;">
        <h2 style="border-bottom: 2px solid #dee2e6; padding-bottom: 10px;">My Profile & Portfolio</h2>
        
        <div id="view-state" style="background: #fff; padding: 30px; border-radius: 8px; border: 1px solid #dee2e6; margin-top: 20px; display: none;">
            <div style="margin-bottom: 20px;">
                <h4 style="color: #6c757d; margin: 0 0 5px 0;">Bio</h4>
                <p id="view-bio" style="margin: 0; white-space: pre-wrap;">-</p>
            </div>
            <div style="margin-bottom: 20px;">
                <h4 style="color: #6c757d; margin: 0 0 5px 0;">Skills</h4>
                <p id="view-skills" style="margin: 0;">-</p>
            </div>
            <div style="margin-bottom: 20px;">
                <h4 style="color: #6c757d; margin: 0 0 5px 0;">Education</h4>
                <p id="view-education" style="margin: 0; white-space: pre-wrap;">-</p>
            </div>
            <div style="margin-bottom: 20px;">
                <h4 style="color: #6c757d; margin: 0 0 5px 0;">Projects</h4>
                <p id="view-projects" style="margin: 0; white-space: pre-wrap;">-</p>
            </div>
            <div style="margin-bottom: 20px;">
                <h4 style="color: #6c757d; margin: 0 0 5px 0;">Portfolio / Link</h4>
                <a id="view-portfolio" href="#" target="_blank" style="color: #0d6efd;">-</a>
            </div>
            <button class="btn-primary" onclick="toggleEdit(true)" style="margin-top: 10px;">Edit Profile</button>
        </div>

        <div id="edit-state" style="background: #fff; padding: 20px; border-radius: 8px; border: 1px solid #dee2e6; margin-top: 20px; display: none;">
            <form id="profileForm">
                <label style="font-weight: 600;">Bio</label>
                <textarea id="bio" rows="3" placeholder="Tell companies about yourself"></textarea>
                
                <label style="font-weight: 600;">Skills (Comma separated)</label>
                <input type="text" id="skills" placeholder="Java, React, MySQL, Node.js">
                
                <label style="font-weight: 600;">Education</label>
                <textarea id="education" rows="2" placeholder="B.Tech Computer Science, University Name, 2026"></textarea>
                
                <label style="font-weight: 600;">Projects</label>
                <textarea id="projects" rows="3" placeholder="Superset Clone - Built using Node.js, GraphQL, MySQL"></textarea>
                
                <label style="font-weight: 600;">Portfolio / GitHub Link</label>
                <input type="url" id="portfolio_link" placeholder="https://github.com/yourusername">
                
                <div style="display: flex; gap: 15px; margin-top: 20px;">
                    <button type="submit" class="btn-primary" style="flex: 1;">Save Profile</button>
                    <button type="button" class="btn-outline" style="flex: 1;" onclick="toggleEdit(false)">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const studentId = localStorage.getItem('studentId');
        if (!studentId) window.location.href = '/login.html';

        function logout() {
            localStorage.clear();
            window.location.href = '/login.html';
        }

        let hasProfileData = false;

        function toggleEdit(showEdit) {
            if(showEdit) {
                document.getElementById('view-state').style.display = 'none';
                document.getElementById('edit-state').style.display = 'block';
            } else {
                document.getElementById('edit-state').style.display = 'none';
                document.getElementById('view-state').style.display = 'block';
            }
        }

        async function fetchProfile() {
            const query = `query { getStudent(id: "${studentId}") { bio skills education projects portfolio_link } }`;
            const response = await fetch('/graphql', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ query }) });
            const result = await response.json();
            
            if (result.data && result.data.getStudent) {
                const s = result.data.getStudent;
                
                if (s.bio || s.skills || s.education || s.projects || s.portfolio_link) {
                    hasProfileData = true;
                    
                    document.getElementById('view-bio').innerText = s.bio || '-';
                    document.getElementById('view-skills').innerText = s.skills || '-';
                    document.getElementById('view-education').innerText = s.education || '-';
                    document.getElementById('view-projects').innerText = s.projects || '-';
                    
                    const portLink = document.getElementById('view-portfolio');
                    if(s.portfolio_link) {
                        portLink.href = s.portfolio_link;
                        portLink.innerText = s.portfolio_link;
                    } else {
                        portLink.removeAttribute('href');
                        portLink.innerText = '-';
                    }

                    document.getElementById('bio').value = s.bio || '';
                    document.getElementById('skills').value = s.skills || '';
                    document.getElementById('education').value = s.education || '';
                    document.getElementById('projects').value = s.projects || '';
                    document.getElementById('portfolio_link').value = s.portfolio_link || '';
                }
            }
            
            toggleEdit(!hasProfileData);
        }

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const bio = document.getElementById('bio').value.replace(/\n/g, '\\n');
            const skills = document.getElementById('skills').value;
            const education = document.getElementById('education').value.replace(/\n/g, '\\n');
            const projects = document.getElementById('projects').value.replace(/\n/g, '\\n');
            const portfolio_link = document.getElementById('portfolio_link').value;

            const query = `
                mutation {
                    updateStudentProfile(
                        id: "${studentId}", 
                        bio: "${bio}", 
                        skills: "${skills}", 
                        education: "${education}", 
                        projects: "${projects}", 
                        portfolio_link: "${portfolio_link}"
                    ) { id }
                }
            `;
            
            await fetch('/graphql', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ query }) });
            alert('Profile updated successfully!');
            fetchProfile(); 
        });

        fetchProfile();
    </script>
</body>
</html>
